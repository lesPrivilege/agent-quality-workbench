# Agent 注册配置
#
# 注册新 agent 只需在 agents 列表中添加一个条目，无需修改任何 .py 文件。
#
# risk_rules 是对各 agent guardrail 逻辑的镜像，存在 drift 风险。
# 长期方向：让 agent 在 audit_log 输出 risk_signals 字段，workbench 直接消费，届时删除本节。
#
# risk_rules 支持 {template: name} 引用垂类 profile 中的 risk_rule_templates，
# 与内联规则可混用。
#
# ground truth 路由期望定义在 goldset/<name>.yaml，通过 goldset 字段引用。

agents:
  - name: contract-approval-agent
    repo: ~/Projects/contract-approval-agent
    vertical: legal-compliance
    id_field: contract_id
    source_data: contracts.jsonl
    goldset: goldset/contract-approval-agent.yaml
    field_map:
      case_id: contract_id
      duration_ms: duration_ms
    route_map:
      auto_approved: auto
      approved: hitl
      rejected: hitl
      blocked: block
    risk_rules:
      - {template: related_party}
      - {template: irreversible}
      - {template: guarantee}

  - name: compliance-review-agent
    repo: ~/Projects/compliance-review-agent
    vertical: legal-compliance
    id_field: material_id
    source_data: materials.jsonl
    goldset: goldset/compliance-review-agent.yaml
    field_map:
      case_id: material_id
      duration_ms: duration_ms
    route_map:
      auto_approved: auto
      approved: hitl
      rejected: hitl
      blocked: block
    risk_rules:
      - {template: related_party}
      - {template: data_share_and_regulated}
      - {template: guarantee}
      - {template: antitrust_high_value}
